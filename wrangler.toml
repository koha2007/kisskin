name = "kisskin"
pages_build_output_dir = "dist/client"
compatibility_date = "2026-02-18"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"

[vars]
# GEMINI_API_KEY는 Cloudflare 대시보드 Environment variables에서 시크릿으로 관리

# ── 메이크업 사용량/크레딧 가드용 KV (프로덕션) ──────────────────────────
# makeup-edit Worker가 (fingerprint+IP)당 무료 횟수를 기록하는 저장소.
# dev 는 vite.config.ts 의 파일백드 셔임을 쓰므로 이 바인딩과 무관(프로덕션 전용).
# 네임스페이스는 `npx wrangler kv namespace create MAKEUP_USAGE` 로 생성됨.
[[kv_namespaces]]
binding = "MAKEUP_USAGE"
id = "1588216109cc4401b0bfd7356e2a6d46"

# ── 앱 푸시 알림 토큰 저장소 ──────────────────────────────────────────
# Expo 앱이 발급한 푸시 토큰을 (register-push-token 함수가) 여기에 저장.
# 발송기가 이 KV 를 순회하며 Expo Push API 로 알림 발송.
# ⚠️ 배포 전 네임스페이스 생성 필요:
#    npx wrangler kv namespace create PUSH_TOKENS
#    → 출력된 id 를 아래 PLACEHOLDER 자리에 붙여넣기.
[[kv_namespaces]]
binding = "PUSH_TOKENS"
id = "PLACEHOLDER_RUN_wrangler_kv_namespace_create_PUSH_TOKENS"
