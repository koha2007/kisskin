name: Daily K-beauty content

# 매일 06:00 KST:
#   · 뉴스 1편 (Gemini + Google Search 그라운딩) + EN 자동번역
#   · 메이크업 제품 1건 (검색 그라운딩 + 무드컷 이미지) + EN 자동번역
# push → Cloudflare Pages 가 자동 빌드/배포(빌드 중 gen:sitemap 이 사이트맵 자동 갱신).
#
# 필요: 저장소 Settings → Secrets and variables → Actions → New repository secret
#        이름 GEMINI_API_KEY 로 Gemini API 키 등록.
#
# 수동 실행: Actions 탭 → Daily K-beauty content → Run workflow (news count 입력 가능).

on:
  schedule:
    - cron: '0 21 * * *'   # 매일 21:00 UTC = 06:00 KST
  workflow_dispatch:
    inputs:
      count:
        description: '생성할 뉴스 편수'
        required: false
        default: '1'

concurrency:
  group: daily-content
  cancel-in-progress: false

permissions:
  contents: write            # 생성 결과를 main 에 푸시

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30    # 생성(≈5~10분) + IndexNow 의 배포 대기(최대 10분)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate news article(s) + EN
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/gen-news.mjs "${{ github.event.inputs.count || '1' }}"

      - name: Generate makeup product + EN
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/gen-products.mjs

      - name: Regenerate sitemap
        run: npm run gen:sitemap

      - name: Commit & push if changed
        id: push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/news/items.ts src/lib/news/items.en.ts src/lib/news/enSlugs.ts \
                  src/lib/products/items.ts src/lib/products/items.en.ts src/lib/products/enSlugs.ts \
                  public/products public/sitemap.xml
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            # skip 토큰 금지: Cloudflare Pages 가 '[skip ci]'류를 인식해 배포를 건너뛴다.
            # GITHUB_TOKEN 푸시는 다른 워크플로를 재트리거하지 않으므로 루프 위험도 없음.
            git commit -m "chore(content): 일일 뉴스·메이크업 제품 자동 발행 (KO+EN)"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # 새 글을 네이버·Bing 에 즉시 알린다(크롤링 주기를 기다리지 않음).
      # 구글은 IndexNow 미지원 → Search Console 에서 사람이 요청해야 한다.
      # 새 URL 은 사이트맵 diff 로 뽑는다(KO/EN 구분 없이 정확). 허브(목록) 페이지는
      # URL 이 그대로여도 내용이 갱신되므로 함께 알린다.
      - name: IndexNow 색인 요청 (네이버 + Bing)
        if: steps.push.outputs.pushed == 'true'
        continue-on-error: true    # 색인 요청 실패가 콘텐츠 발행을 망치지 않게
        run: |
          NEW=$(git show HEAD -- public/sitemap.xml \
                | grep '^+.*<loc>' \
                | sed -E 's/.*<loc>([^<]+)<\/loc>.*/\1/' \
                | sort -u)
          HUBS="https://kissinskin.net/news/ https://kissinskin.net/products/ https://kissinskin.net/en/news/ https://kissinskin.net/en/products/"
          echo "새 URL:"; echo "$NEW" | sed 's/^/  /'
          # --wait: Cloudflare Pages 배포가 끝나 새 글이 실제로 200 을 줄 때까지 기다린다
          # (배포 전에 알리면 크롤러가 404 를 만나 "없는 페이지"로 학습된다).
          node scripts/indexnow.mjs --wait $NEW $HUBS
