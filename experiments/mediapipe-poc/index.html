<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MediaPipe 메이크업+헤어 오버레이 POC</title>
<style>
  body{font-family:system-ui,'Apple SD Gothic Neo',sans-serif;margin:0;background:#0f1115;color:#e7e7ea}
  header{padding:16px 20px;border-bottom:1px solid #252833}
  h1{font-size:17px;margin:0}
  .sub{color:#8a8f9a;font-size:13px;margin-top:4px}
  main{display:flex;gap:20px;padding:20px;flex-wrap:wrap}
  .panel{background:#161922;border:1px solid #252833;border-radius:12px;padding:16px;min-width:320px}
  .row{display:flex;gap:10px;align-items:center;margin:8px 0;flex-wrap:wrap}
  label{font-size:13px;color:#aab}
  canvas,img.preview{max-width:420px;width:100%;border-radius:10px;border:1px solid #252833;background:#000}
  button{background:#6d5efc;color:#fff;border:0;border-radius:8px;padding:9px 14px;font-size:14px;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
  input[type=color]{width:42px;height:30px;border:0;background:none}
  #status{font-size:12px;color:#7fd1a0;white-space:pre-wrap;font-family:ui-monospace,monospace;margin-top:10px}
  .seg{display:flex;gap:6px}
  .seg button{background:#222636}
  .seg button.on{background:#6d5efc}
</style>
</head>
<body>
<header>
  <h1>MediaPipe AR 오버레이 POC — 얼굴 100% 보존 검증</h1>
  <div class="sub">FaceLandmarker(립·블러셔) + ImageSegmenter selfie_multiclass(헤어 컬러). 모델·WASM은 CDN 로드. 전부 브라우저 온디바이스, 서버 전송 없음.</div>
</header>
<main>
  <div class="panel">
    <div class="row"><input type="file" id="file" accept="image/*" /></div>
    <div class="row">
      <label>적용:</label>
      <div class="seg" id="toggles">
        <button data-k="lip" class="on">립</button>
        <button data-k="blush" class="on">블러셔</button>
        <button data-k="hair" class="on">헤어색</button>
      </div>
    </div>
    <div class="row">
      <label>립</label><input type="color" id="lipColor" value="#c64b5a" />
      <label>블러셔</label><input type="color" id="blushColor" value="#ff7a6b" />
      <label>헤어</label><input type="color" id="hairColor" value="#a85a2c" />
    </div>
    <div class="row">
      <button id="run" disabled>처리</button>
      <button id="toggleMask" style="background:#222636">헤어 마스크 보기</button>
    </div>
    <div id="status">모델 로딩 대기…</div>
  </div>
  <div class="panel">
    <div class="row"><label>원본</label></div>
    <img id="orig" class="preview" />
  </div>
  <div class="panel">
    <div class="row"><label>결과 (얼굴 픽셀 보존 + 오버레이)</label></div>
    <canvas id="out"></canvas>
  </div>
</main>

<script type="module">
import { FilesetResolver, FaceLandmarker, ImageSegmenter }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18";

const VER = "0.10.18";
const WASM = `https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@${VER}/wasm`;
const FACE_MODEL = "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task";
const SEG_MODEL  = "https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_multiclass_256x256/float32/latest/selfie_multiclass_256x256.tflite";

const statusEl = document.getElementById('status');
const log = (m)=>{ statusEl.textContent += "\n"+m; console.log(m); };
const setStatus = (m)=>{ statusEl.textContent = m; console.log(m); };

// ── 표준 순서형 립 링(외곽/내곽) ──
const LIP_OUTER = [61,185,40,39,37,0,267,269,270,409,291,375,321,405,314,17,84,181,91,146];
const LIP_INNER = [78,191,80,81,82,13,312,311,310,415,308,324,318,402,317,14,87,178,88,95];
// 볼(블러셔) 중심 근사 랜드마크
const CHEEK_L = 50, CHEEK_R = 280;
// 얼굴 가로폭 추정
const FACE_L = 234, FACE_R = 454;
const HAIR_CATEGORY = 1; // selfie_multiclass: 0 bg,1 hair,2 body-skin,3 face-skin,4 clothes,5 others

let faceLandmarker = null, segmenter = null, ready = false;
let lastMaskCanvas = null, showMask = false;

async function init(){
  try{
    setStatus("FilesetResolver 로딩…");
    const vision = await FilesetResolver.forVisionTasks(WASM);
    setStatus("FaceLandmarker 모델 다운로드…");
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions:{ modelAssetPath: FACE_MODEL, delegate: "CPU" },
      runningMode:"IMAGE", numFaces:1, outputFaceBlendshapes:false,
    });
    setStatus("ImageSegmenter(헤어) 모델 다운로드…");
    segmenter = await ImageSegmenter.createFromOptions(vision, {
      baseOptions:{ modelAssetPath: SEG_MODEL, delegate: "CPU" },
      runningMode:"IMAGE", outputCategoryMask:true, outputConfidenceMasks:false,
    });
    ready = true;
    setStatus("✅ 모델 준비 완료. 사진을 올리세요.");
    document.getElementById('run').disabled = false;
    window.__POC_READY = true;
  }catch(e){
    setStatus("❌ 초기화 실패: "+(e.message||e));
    window.__POC_ERROR = String(e.message||e);
  }
}

function hexToRgb(h){ const n=parseInt(h.slice(1),16); return [n>>16&255,n>>8&255,n&255]; }

function ringPath(ctx, lm, idx, w, h){
  ctx.moveTo(lm[idx[0]].x*w, lm[idx[0]].y*h);
  for(let i=1;i<idx.length;i++) ctx.lineTo(lm[idx[i]].x*w, lm[idx[i]].y*h);
  ctx.closePath();
}

// ── 헤어 세그 통계(검증 지표 산출용) ──
function hairStats(maskData, mw, mh){
  let hair=0, faceSkin=0, total=mw*mh;
  for(let i=0;i<maskData.length;i++){
    if(maskData[i]===HAIR_CATEGORY) hair++;
    else if(maskData[i]===3) faceSkin++;
  }
  return { hairPct:+(100*hair/total).toFixed(2), faceSkinPct:+(100*faceSkin/total).toFixed(2) };
}

// 핵심 처리. opts: {lip,blush,hair(bool), lipColor,blushColor,hairColor(hex)}
async function process(imgEl, opts){
  const w = imgEl.naturalWidth || imgEl.width;
  const h = imgEl.naturalHeight || imgEl.height;
  const out = document.getElementById('out');
  out.width = w; out.height = h;
  const ctx = out.getContext('2d');
  // 1) 원본 픽셀을 그대로 깐다 → 얼굴은 절대 재생성 안 함(보존 보장)
  ctx.drawImage(imgEl, 0, 0, w, h);
  const origSnap = ctx.getImageData(0,0,w,h); // 보존 검증용 스냅샷

  const report = { w, h, face:false, hair:null, notes:[] };

  // 2) 얼굴 랜드마크
  let lm = null;
  if(opts.lip || opts.blush){
    const res = faceLandmarker.detect(imgEl);
    if(res.faceLandmarks && res.faceLandmarks.length){
      lm = res.faceLandmarks[0];
      report.face = true;
    } else {
      report.notes.push("얼굴 미검출 → 립/블러셔 스킵");
    }
  }

  // 3) 립 오버레이 (multiply, 안쪽 구멍 evenodd 컷)
  if(opts.lip && lm){
    const [r,g,b] = hexToRgb(opts.lipColor);
    ctx.save();
    ctx.beginPath();
    ringPath(ctx, lm, LIP_OUTER, w, h);
    ringPath(ctx, lm, LIP_INNER, w, h);
    ctx.clip("evenodd");
    ctx.globalCompositeOperation = "multiply";
    ctx.globalAlpha = 0.42;
    ctx.filter = "blur(1.5px)"; // 립 가장자리 페더링
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0,0,w,h);
    ctx.restore();
  }

  // 4) 블러셔 (소프트 라디얼, soft-light 느낌을 multiply 저알파로 근사)
  if(opts.blush && lm){
    const [r,g,b] = hexToRgb(opts.blushColor);
    const fw = Math.abs(lm[FACE_R].x - lm[FACE_L].x) * w;
    const rad = fw * 0.24; // 더 넓게
    for(const ci of [CHEEK_L, CHEEK_R]){
      const cx = lm[ci].x*w, cy = lm[ci].y*h;
      const grd = ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
      // 중심도 약하게 + 부드러운 감쇠 → 동그란 자국 방지
      grd.addColorStop(0,   `rgba(${r},${g},${b},0.22)`);
      grd.addColorStop(0.5, `rgba(${r},${g},${b},0.10)`);
      grd.addColorStop(1,   `rgba(${r},${g},${b},0)`);
      ctx.save();
      ctx.globalCompositeOperation = "multiply";
      ctx.filter = "blur(6px)"; // 경계 완전 페더
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  // 5) 헤어 컬러 — 세그멘테이션 마스크 기반, 휘도 보존 리컬러
  if(opts.hair){
    const segRes = segmenter.segment(imgEl);
    const mask = segRes.categoryMask;
    const mw = mask.width, mh = mask.height;
    const md = mask.getAsUint8Array();
    report.hair = hairStats(md, mw, mh);

    // 마스크 디버그 캔버스
    lastMaskCanvas = document.createElement('canvas');
    lastMaskCanvas.width = mw; lastMaskCanvas.height = mh;
    const mctx = lastMaskCanvas.getContext('2d');
    const mImg = mctx.createImageData(mw, mh);
    for(let i=0;i<md.length;i++){
      const on = md[i]===HAIR_CATEGORY;
      mImg.data[i*4]= on?255:0; mImg.data[i*4+1]=on?80:0; mImg.data[i*4+2]=on?200:0; mImg.data[i*4+3]= on?255:255;
    }
    mctx.putImageData(mImg,0,0);

    // 마스크를 원본 해상도로 업스케일해 픽셀 인덱스 매핑
    const [tr,tg,tb] = hexToRgb(opts.hairColor);
    const frame = ctx.getImageData(0,0,w,h);
    const fd = frame.data;
    // 타깃 컬러의 상대 밝기 정규화용
    for(let y=0;y<h;y++){
      const my = Math.min(mh-1, (y*mh/h)|0);
      for(let x=0;x<w;x++){
        const mx = Math.min(mw-1, (x*mw/w)|0);
        if(md[my*mw+mx]!==HAIR_CATEGORY) continue;
        const p=(y*w+x)*4;
        // 원본 휘도
        const lum = (0.299*fd[p]+0.587*fd[p+1]+0.114*fd[p+2])/255;
        // 휘도 보존 리컬러: 타깃색 × 휘도 가중 + 원본 텍스처 30% 유지
        const nr = tr*lum, ng = tg*lum, nb = tb*lum;
        fd[p]   = nr*0.7 + fd[p]*0.3;
        fd[p+1] = ng*0.7 + fd[p+1]*0.3;
        fd[p+2] = nb*0.7 + fd[p+2]*0.3;
      }
    }
    ctx.putImageData(frame,0,0);
    mask.close();
  }

  if(showMask && lastMaskCanvas){
    ctx.globalAlpha=0.6; ctx.drawImage(lastMaskCanvas,0,0,w,h); ctx.globalAlpha=1;
  }

  // 6) 보존 검증: 원본 대비 바뀐 픽셀만 빨갛게 → 변경이 입술/볼/머리에만 있으면 얼굴 보존 OK
  const fin = ctx.getImageData(0,0,w,h).data;
  const o = origSnap.data;
  const heat = ctx.createImageData(w,h);
  let changed=0;
  for(let i=0;i<o.length;i+=4){
    const d = Math.abs(fin[i]-o[i])+Math.abs(fin[i+1]-o[i+1])+Math.abs(fin[i+2]-o[i+2]);
    const on = d>24;
    if(on) changed++;
    // 원본을 어둡게 깔고 변경부를 빨강 강조
    heat.data[i]   = on?255:(o[i]*0.35);
    heat.data[i+1] = on?40:(o[i+1]*0.35);
    heat.data[i+2] = on?40:(o[i+2]*0.35);
    heat.data[i+3] = 255;
  }
  report.changedPct = +(100*changed/(w*h)).toFixed(2);
  const heatCv = document.createElement('canvas'); heatCv.width=w; heatCv.height=h;
  heatCv.getContext('2d').putImageData(heat,0,0);
  window.__lastDiff = heatCv.toDataURL('image/png');

  return report;
}

// ── 헤드리스 진입점 ──
window.processImage = async function(dataUrl, opts){
  const img = new Image();
  await new Promise((res,rej)=>{ img.onload=res; img.onerror=rej; img.src=dataUrl; });
  document.getElementById('orig').src = dataUrl;
  const report = await process(img, opts);
  const result = document.getElementById('out').toDataURL('image/png');
  return { report, result, diff: window.__lastDiff };
};

// ── 수동 UI ──
const toggles = {lip:true, blush:true, hair:true};
document.querySelectorAll('#toggles button').forEach(b=>{
  b.onclick=()=>{ const k=b.dataset.k; toggles[k]=!toggles[k]; b.classList.toggle('on',toggles[k]); };
});
let curImg=null;
document.getElementById('file').onchange=(e)=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ document.getElementById('orig').src=r.result; curImg=r.result; };
  r.readAsDataURL(f);
};
document.getElementById('run').onclick=async()=>{
  if(!curImg||!ready) return;
  setStatus("처리 중…");
  const opts={ ...toggles,
    lipColor:document.getElementById('lipColor').value,
    blushColor:document.getElementById('blushColor').value,
    hairColor:document.getElementById('hairColor').value };
  const {report}=await window.processImage(curImg, opts);
  setStatus("완료\n"+JSON.stringify(report,null,2));
};
document.getElementById('toggleMask').onclick=()=>{ showMask=!showMask; if(curImg) document.getElementById('run').click(); };

init();
</script>
</body>
</html>
