<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KisSkin - 오프라인</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
      color: #333;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 400px; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; color: #eb4763; }
    p { font-size: 1rem; color: #666; line-height: 1.6; margin-bottom: 2rem; }
    button {
      background: #eb4763; color: white; border: none;
      padding: 0.875rem 2rem; border-radius: 50px;
      font-size: 1rem; cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #d4365a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>인터넷 연결을 확인해주세요</h1>
    <p>KisSkin을 사용하려면 인터넷 연결이 필요합니다.<br>연결 후 다시 시도해주세요.</p>
    <button onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
