    .wrap { max-width: 480px; width: 100%; }

    .btn-primary { background: linear-gradient(135deg, #eb4763 0%, #f472b6 100%); color: #fff; box-shadow: 0 8px 20px rgba(235,71,99,0.25); }
    .btn-primary:hover { transform: translateY(-1px); }
    .btn-secondary { background: #fff; color: #0f172a; border: 1px solid #fecdd3; }
    .btn-secondary:hover { background: #fdf2f8; }
    .links { margin-top: 32px; display: flex; gap: 18px; justify-content: center; flex-wrap: wrap; }
    .links a { color: #94a3b8; font-size: 13px; text-decoration: none; }
    .links a:hover { color: #eb4763; }
    @media (min-width: 640px) {
      .btns { flex-direction: row; justify-content: center; }
    }
