<!doctype html>
<html class="light" lang="ko" dir="ltr" style="scroll-behavior: smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Pretendard Variable — 지금까지 폰트 스택에 이름만 있고 실제로는 로드되지 않아,
         한글이 시스템 폴백(Windows=맑은 고딕)으로 렌더돼 노후해 보였다. 동적 서브셋 CSS 라
         실제 쓰이는 글자 범위의 woff2 청크만 내려받는다. (Noto Serif KR 은 제거 — 한글 명조가
         "옛스럽다"의 주원인이었다.) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <!-- Cormorant Garamond — 영문 제목 전용 세리프. 한글 글리프가 없으므로 한글은 자동으로
         Pretendard 로 폴백된다(src/index.css 의 --font-serif 주석 참고).
         display=optional: 100ms 안에 못 받으면 폴백을 유지하고 '나중에 바꿔치지 않는다'.
         Clarity 에서 CLS 0.56(나쁨)이 찍힌 상태라 제목 폰트 스왑으로 인한 추가 시프트를
         원천 차단하는 쪽을 택했다. 캐시된 재방문자는 정상적으로 세리프를 보게 된다. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&display=optional"
    />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
